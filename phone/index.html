<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<title>Senjutsu — Controller</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Suggerimento orientamento (mostrato solo in verticale) -->
  <div id="rotate" class="rotate-hint">
    <div class="kanji">戦</div>
    <p>Ruota il telefono in <b>orizzontale</b></p>
  </div>

  <!-- Schermata di connessione -->
  <div id="connect" class="screen connect">
    <div class="seal">戦</div>
    <h1>Senjutsu</h1>
    <p class="sub">Controller del giocatore</p>
    <label>Server
      <input id="server" type="text" placeholder="ws://INDIRIZZO:8080" />
    </label>
    <label>Codice stanza
      <input id="code" type="text" maxlength="6" autocapitalize="characters" placeholder="ABCD" />
    </label>
    <div class="seats">
      <button class="seat jp" data-seat="0">Giocatore 1</button>
      <button class="seat jp" data-seat="1">Giocatore 2</button>
    </div>
    <p id="status" class="status"></p>
  </div>

  <!-- Schermata di gioco (orizzontale) -->
  <div id="game" class="screen game hidden">
    <header id="hud">
      <div class="hud-id">
        <span id="who" class="who"></span>
        <span id="kamae" class="chip"></span>
      </div>
      <div id="news" class="news"></div>
      <div class="hud-stats">
        <span id="wounds" class="stat wounds"></span>
        <span id="focus" class="stat focus"></span>
        <span id="round" class="stat round"></span>
        <button id="leave" class="ghost">Esci</button>
      </div>
    </header>
    <p id="net" class="net"></p>
    <main id="content"></main>
    <!-- Ritratti dei due contendenti ai lati dello schermo (chi combatte). -->
    <div id="fighters" class="fighters">
      <figure id="fLeft" class="fighter left hidden"><img class="pic" alt="" /><figcaption class="nm"></figcaption></figure>
      <figure id="fRight" class="fighter right hidden"><img class="pic" alt="" /><figcaption class="nm"></figcaption></figure>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
